name: Deploy Lambda RDS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION_NAME: LambdaRds2

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Verificar secrets requeridos
        run: |
          missing=()
          [[ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]] && missing+=("AWS_ACCESS_KEY_ID")
          [[ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]] && missing+=("AWS_SECRET_ACCESS_KEY")
          [[ -z "${{ secrets.DB_HOST }}" ]] && missing+=("DB_HOST")
          [[ -z "${{ secrets.DB_USER }}" ]] && missing+=("DB_USER")
          [[ -z "${{ secrets.DB_PASSWORD }}" ]] && missing+=("DB_PASSWORD")
          [[ -z "${{ secrets.DB_NAME }}" ]] && missing+=("DB_NAME")
          [[ -z "${{ secrets.DB_PORT }}" ]] && missing+=("DB_PORT")

          if [ ${#missing[@]} -ne 0 ]; then
            echo "Error: Faltan secrets requeridos: ${missing[*]}"
            echo "Verifica Settings > Secrets and variables > Actions en el repositorio."
            exit 1
          fi
          echo " ✅ Todos los secrets estan configurados correctamente"

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verificar funcion Lambda existente
        run: |
          echo "Verificando funcion Lambda: ${{ env.LAMBDA_FUNCTION_NAME }}"
          aws lambda get-function --function-name ${{ env.LAMBDA_FUNCTION_NAME }} || echo "Funcion no encontrada"

      - name: Instalar dependencias
        run: |
          echo "Instalando dependencias para produccion..."
          npm ci --production --silent
          npm rebuild --arch=x64 --platform=linux --silent

      - name: Preparar archivos para empaquetado
        run: |
          echo "Preparando archivos..."
          mkdir -p lambda-package
          cp index.js lambda-package/
          cp package.json lambda-package/
          cp -r node_modules lambda-package/
          [ -f package-lock.json ] && cp package-lock.json lambda-package/
          ls -la lambda-package/

      - name: Crear paquete ZIP optimizado
        run: |
          cd lambda-package
          echo "Creando paquete ZIP..."
          zip -r ../function.zip . \
            -x "*.git*" \
            -x "*.md" \
            -x "*.test.js" \
            -x "test/*" \
            -x "docs/*" \
            -x "*.log" \
            -x "node_modules/.cache/*" \
            -x "node_modules/*/test/*" \
            -x "node_modules/*/docs/*" \
            -x "node_modules/*/*.md"
          cd ..

      - name: Verificar tamano del paquete
        run: |
          echo "=== Informacion del paquete ==="
          ls -lh function.zip
          SIZE=$(stat -f%z function.zip 2>/dev/null || stat -c%s function.zip)
          echo "Tamano: $SIZE bytes"
          if [ $SIZE -gt 52428800 ]; then
            echo "ADVERTENCIA: El paquete es mayor a 50MB"
          else
            echo "Tamano del paquete OK"
          fi

      - name: Desplegar funcion Lambda
        run: |
          echo "Desplegando funcion: ${{ env.LAMBDA_FUNCTION_NAME }}"
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://function.zip \
            --output table

      - name: Actualizar configuracion de la funcion
        run: |
          echo "Actualizando configuracion de la funcion..."
          aws lambda update-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --timeout 30 \
            --memory-size 256 \
            --environment Variables='{
              "NODE_ENV":"production",
              "DB_HOST":"${{ secrets.DB_HOST }}",
              "DB_USER":"${{ secrets.DB_USER }}",
              "DB_PASSWORD":"${{ secrets.DB_PASSWORD }}",
              "DB_NAME":"${{ secrets.DB_NAME }}",
              "DB_PORT":"${{ secrets.DB_PORT }}"
            }' || echo "No se pudo actualizar la configuracion - continuando..."

      - name: Esperar a que la funcion este lista
        run: |
          echo "Esperando a que la funcion este lista..."
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }}

      - name: Verificar despliegue exitoso
        run: |
          echo "=== Verificacion del despliegue ==="
          aws lambda get-function \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --query 'Configuration.[FunctionName,Runtime,LastModified,CodeSize,State]' \
            --output table

      - name: Limpiar archivos temporales
        run: |
          rm -rf lambda-package
          rm -f function.zip response.json
          echo "Limpieza completada"

      - name: Resumen del despliegue
        run: |
          echo "Despliegue completado"
          echo "Funcion: ${{ env.LAMBDA_FUNCTION_NAME }}"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Timestamp: $(date)"
